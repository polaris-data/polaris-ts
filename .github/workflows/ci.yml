name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: node -e "require('./dist/index.cjs')"  # smoke test CJS
        name: Smoke test (CJS)

      - run: node --input-type=module -e "import './dist/index.js'"  # smoke test ESM
        name: Smoke test (ESM)
